<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#3B82F6" />
  <title>열·약 기록</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:linear-gradient(135deg,#EFF6FF 0%,#FFF7ED 100%);min-height:100vh;font-family:'Apple SD Gothic Neo','Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;-webkit-tap-highlight-color:transparent;color:#1F2937}
    button,input,textarea,select{font-family:inherit}
    button:active{transform:scale(.98)}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:4px}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo}=React;
const RK="fever-v2-records", KK="fever-v2-kids";
const OLD_RK="fever-v1-records", OLD_KK="fever-v1-kids";
const MEDS=[
  {id:"none",label:"약 안먹음",emoji:"💧",color:"#6B7280",group:"none"},
  {id:"cough",label:"기침약",emoji:"🌿",color:"#10B981",group:"cough"},
  {id:"brufen",label:"부루펜",emoji:"🔵",color:"#3B82F6",group:"brufen"},
  {id:"tylenol",label:"타이레놀",emoji:"🔴",color:"#EF4444",group:"tylenol"},
  {id:"cough+brufen",label:"기침약+부루펜",emoji:"🌿🔵",color:"#6366F1",group:"brufen"},
  {id:"cough+tylenol",label:"기침약+타이레놀",emoji:"🌿🔴",color:"#EC4899",group:"tylenol"},
];
const GC={female:{label:"여자",emoji:"👧",accent:"#EC4899",bg:"#FDF2F8",badge:"#FCE7F3"},male:{label:"남자",emoji:"👦",accent:"#3B82F6",bg:"#EFF6FF",badge:"#DBEAFE"},other:{label:"기타",emoji:"🧒",accent:"#8B5CF6",bg:"#F5F3FF",badge:"#EDE9FE"}};
const med=id=>MEDS.find(m=>m.id===id)||MEDS[0];
const gc=g=>GC[g]||GC.other;
const tempColor=t=>{const f=parseFloat(t);return f>=38.5?"#EF4444":f>=37.5?"#F97316":"#10B981"};
const tempText=t=>{const f=parseFloat(t);return f>=38.5?"고열":f>=37.5?"미열":"보통"};
const pad=n=>String(n).padStart(2,"0");
const fmt=ts=>{const d=new Date(ts);return {date:`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`,short:`${d.getMonth()+1}/${d.getDate()}`,time:`${pad(d.getHours())}:${pad(d.getMinutes())}`,dateKo:`${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())}`}};
const toInput=ts=>{const d=new Date(ts);return {ds:`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`,tm:`${pad(d.getHours())}:${pad(d.getMinutes())}`}};
const fromInput=(ds,tm)=>new Date(`${ds}T${tm}:00`).toISOString();
const load=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))||d}catch{return d}};
const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const uid=()=>Date.now()+Math.floor(Math.random()*1000);
function initialData(){
  const kids=load(KK,null)??load(OLD_KK,[]);
  const recs=load(RK,null)??load(OLD_RK,[]);
  return {kids,recs:recs.map(r=>({...r,note:r.note||""}))};
}
function Header({title,onBack,right}){return <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
  {onBack&&<button onClick={onBack} style={btnIcon("#F3F4F6","#374151")}>←</button>}
  <div style={{flex:1,fontSize:19,fontWeight:900,color:"#1E3A5F",letterSpacing:-.5}}>{title}</div>{right}
</div>}
function Section({label,children,mb=18}){return <div style={{marginBottom:mb}}><div style={{fontSize:12,fontWeight:800,color:"#6B7280",marginBottom:9,letterSpacing:.3}}>{label}</div>{children}</div>}
const btnIcon=(bg,color)=>({background:bg,color,border:"none",borderRadius:12,width:38,height:38,fontSize:18,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0});
const primary=(bg)=>({width:"100%",padding:"15px",borderRadius:16,border:"none",fontSize:16,fontWeight:900,color:"#fff",background:bg,cursor:"pointer"});
const inputStyle={width:"100%",padding:"13px 14px",borderRadius:12,border:"2px solid #E5E7EB",fontSize:16,fontWeight:700,color:"#1E3A5F",background:"#F9FAFB",outline:"none"};
function TempPicker({temp,setTemp}){const adj=d=>setTemp(p=>(Math.min(42,Math.max(35,Math.round((parseFloat(p||37)+d)*10)/10))).toFixed(1));const c=tempColor(temp);return <>
  <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:18,marginBottom:10}}>
    <button onClick={()=>adj(-.1)} style={smallRound}>−</button><div style={{fontSize:54,fontWeight:900,minWidth:130,textAlign:"center",lineHeight:1,color:c,letterSpacing:-2}}>{temp}°</div><button onClick={()=>adj(.1)} style={smallRound}>+</button>
  </div>
  <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center"}}>{["36.5","37.0","37.5","38.0","38.5","39.0"].map(t=><button key={t} onClick={()=>setTemp(t)} style={{padding:"7px 10px",borderRadius:10,border:"none",background:temp===t?c:"#F3F4F6",color:temp===t?"#fff":"#374151",fontSize:13,fontWeight:800,cursor:"pointer"}}>{t}°</button>)}</div>
</>}
const smallRound={width:50,height:50,borderRadius:15,border:"2px solid #E5E7EB",background:"#F9FAFB",fontSize:26,fontWeight:900,cursor:"pointer",color:"#374151"};
function MedPicker({value,setValue}){return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>{MEDS.map(m=><button key={m.id} onClick={()=>setValue(m.id)} style={{minHeight:74,padding:"10px 5px",borderRadius:13,border:`2px solid ${value===m.id?m.color:"#E5E7EB"}`,background:value===m.id?m.color:"#F9FAFB",color:value===m.id?"#fff":"#374151",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4}}><span style={{fontSize:20}}>{m.emoji}</span><span style={{fontSize:11,fontWeight:800,lineHeight:1.25,wordBreak:"keep-all"}}>{m.label}</span></button>)}</div>}
function App(){
  const init=initialData();
  const [kids,setKids]=useState(init.kids); const [recs,setRecs]=useState(init.recs);
  const [view,setView]=useState(init.kids.length?"home":"kids");
  const [kid,setKid]=useState(null); const [temp,setTemp]=useState("37.0"); const [medId,setMedId]=useState(null); const [note,setNote]=useState("");
  const nowIn=toInput(new Date().toISOString()); const [ds,setDs]=useState(nowIn.ds); const [tm,setTm]=useState(nowIn.tm);
  const [edit,setEdit]=useState(null); const [filter,setFilter]=useState("today"); const [kidFilter,setKidFilter]=useState("all");
  const [kidForm,setKidForm]=useState(null); const [kName,setKName]=useState(""); const [kGender,setKGender]=useState("female"); const [confirm,setConfirm]=useState(null); const [toast,setToast]=useState("");
  const persistKids=n=>{setKids(n);save(KK,n)}; const persistRecs=n=>{setRecs(n);save(RK,n)};
  const show=t=>{setToast(t);setTimeout(()=>setToast(""),1600)};
  const getKid=id=>kids.find(k=>String(k.id)===String(id));
  const sorted=[...recs].sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  const filtered=sorted.filter(r=>{
    if(kidFilter!=="all"&&String(r.kidId)!==String(kidFilter))return false;
    const d=new Date(r.ts), n=new Date();
    if(filter==="today")return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate();
    if(filter==="24h")return n-d<=24*60*60*1000;
    if(filter==="fever")return parseFloat(r.temp)>=37.5;
    return true;
  });
  const stats=useMemo(()=>{const today=sorted.filter(r=>{const d=new Date(r.ts),n=new Date();return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate()});return {today:today.length,fever:today.filter(r=>parseFloat(r.temp)>=37.5).length,high:today.length?Math.max(...today.map(r=>parseFloat(r.temp))).toFixed(1):"-"}},[recs]);
  const lastSimilar=()=>{if(!kid||!medId||medId==="none")return null; const g=med(medId).group; const last=sorted.find(r=>String(r.kidId)===String(kid.id)&&med(r.med).group===g&&r.med!=="none"); if(!last)return null; const diff=(new Date(fromInput(ds,tm))-new Date(last.ts))/(60*60*1000); return {...last,diff};};
  const openNew=k=>{const n=toInput(new Date().toISOString());setKid(k);setTemp("37.0");setMedId(null);setNote("");setDs(n.ds);setTm(n.tm);setEdit(null);setView("input")};
  const openEdit=r=>{const it=toInput(r.ts);setEdit(r);setKid(getKid(r.kidId));setTemp(r.temp);setMedId(r.med);setNote(r.note||"");setDs(it.ds);setTm(it.tm);setView("input")};
  const submitRecord=()=>{if(!kid||!medId||!ds||!tm)return; const rec={id:edit?.id||uid(),kidId:kid.id,temp,med:medId,note:note.trim(),ts:fromInput(ds,tm)}; const next=edit?recs.map(r=>r.id===edit.id?rec:r):[rec,...recs]; persistRecs(next.sort((a,b)=>new Date(b.ts)-new Date(a.ts))); show(edit?"수정 완료":"저장 완료"); setView("home")};
  const removeRecord=id=>{persistRecs(recs.filter(r=>r.id!==id));setConfirm(null);show("삭제 완료")};
  const openKidForm=k=>{setKidForm(k);setKName(k?.name||"");setKGender(k?.gender||"female");setView("kidForm")};
  const saveKid=()=>{if(!kName.trim())return; if(kidForm){persistKids(kids.map(k=>k.id===kidForm.id?{...k,name:kName.trim(),gender:kGender}:k));} else {persistKids([...kids,{id:uid(),name:kName.trim(),gender:kGender}]);} show("아이 정보 저장 완료"); setView("kids")};
  const delKid=id=>{persistKids(kids.filter(k=>k.id!==id));persistRecs(recs.filter(r=>String(r.kidId)!==String(id)));setConfirm(null);setView("kids")};
  const copyToday=()=>{const arr=sorted.filter(r=>{const d=new Date(r.ts),n=new Date();return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate()}).reverse(); if(!arr.length){alert("오늘 기록이 없습니다");return;} let text=`[열·약 기록 ${fmt(new Date()).short}]\n시간 | 이름 | 체온 | 상태 | 투약 | 메모\n`; arr.forEach(r=>{const k=getKid(r.kidId);const f=fmt(r.ts);text+=`${f.time} | ${k?.name||"??"} | ${r.temp}° | ${tempText(r.temp)} | ${med(r.med).label} | ${r.note||"-"}\n`}); navigator.clipboard?.writeText(text).then(()=>show("오늘 이력 복사됨")).catch(()=>alert(text));};
  const exportJSON=()=>{const data={version:2,exportedAt:new Date().toISOString(),kids,recs};download(`열약기록_백업_${fmt(new Date()).date}.json`,JSON.stringify(data,null,2),"application/json")};
  const exportCSV=()=>{const rows=[["날짜","시간","이름","성별","체온","상태","투약","메모"]]; [...recs].sort((a,b)=>new Date(a.ts)-new Date(b.ts)).forEach(r=>{const k=getKid(r.kidId),f=fmt(r.ts),g=gc(k?.gender);rows.push([f.date,f.time,k?.name||"??",g.label,r.temp,tempText(r.temp),med(r.med).label,r.note||""])});download(`열약기록_${fmt(new Date()).date}.csv`,"\uFEFF"+rows.map(row=>row.map(v=>`"${String(v).replaceAll('"','""')}"`).join(",")).join("\n"),"text/csv;charset=utf-8")};
  const download=(name,content,type)=>{const blob=new Blob([content],{type});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=name;a.click();URL.revokeObjectURL(url)};
  const importJSON=e=>{const file=e.target.files?.[0]; if(!file)return; const reader=new FileReader(); reader.onload=()=>{try{const data=JSON.parse(reader.result); if(!Array.isArray(data.kids)||!Array.isArray(data.recs))throw new Error(); persistKids(data.kids); persistRecs(data.recs); show("백업 불러오기 완료"); setView("home");}catch{alert("백업 파일 형식이 맞지 않습니다")}}; reader.readAsText(file); e.target.value=""};
  const interval=lastSimilar();
  return <div style={{minHeight:"100vh",display:"flex",justifyContent:"center",padding:"14px 10px 36px"}}><div style={{width:"100%",maxWidth:430,background:"#fff",borderRadius:26,boxShadow:"0 8px 40px rgba(0,0,0,.10)",padding:"22px 18px",position:"relative"}}>
    {toast&&<div style={{position:"fixed",top:18,left:"50%",transform:"translateX(-50%)",background:"#111827",color:"#fff",padding:"10px 16px",borderRadius:999,fontSize:14,fontWeight:800,zIndex:10}}>{toast}</div>}
    {view==="home"&&<>
      <Header title="🌡️ 열·약 기록" right={<div style={{display:"flex",gap:8}}><button onClick={()=>setView("history")} style={btnIcon("#EFF6FF","#3B82F6")}>📋</button><button onClick={()=>setView("kids")} style={btnIcon("#F3F4F6","#6B7280")}>⚙️</button></div>}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>{[{t:"오늘",v:stats.today},{t:"미열↑",v:stats.fever},{t:"최고",v:stats.high}].map(x=><div key={x.t} style={{background:"#F9FAFB",border:"1px solid #E5E7EB",borderRadius:14,padding:"11px 6px",textAlign:"center"}}><div style={{fontSize:12,color:"#6B7280",fontWeight:800}}>{x.t}</div><div style={{fontSize:20,color:"#1E3A5F",fontWeight:900,marginTop:2}}>{x.v}</div></div>)}</div>
      {kids.length===0?<Empty text="등록된 아이가 없어요" sub="설정에서 먼저 아이를 추가해 주세요"/>:<div style={{display:"grid",gridTemplateColumns:kids.length===1?"1fr":"1fr 1fr",gap:12}}>{kids.map(k=>{const c=gc(k.gender),last=sorted.find(r=>String(r.kidId)===String(k.id)),f=last&&fmt(last.ts);return <button key={k.id} onClick={()=>openNew(k)} style={{background:`linear-gradient(135deg,${c.bg} 0%,#FFF7ED 100%)`,border:"2px solid #E5E7EB",borderRadius:18,padding:"15px 8px",cursor:"pointer",textAlign:"center"}}><div style={{fontSize:30}}>{c.emoji}</div><div style={{fontSize:17,fontWeight:900,color:"#1E3A5F"}}>{k.name}</div><div style={{display:"inline-block",fontSize:11,color:c.accent,background:c.badge,borderRadius:8,padding:"2px 8px",fontWeight:800,margin:"3px 0 7px"}}>{c.label}</div>{last?<><div style={{fontSize:30,fontWeight:900,color:tempColor(last.temp),lineHeight:1}}>{last.temp}°</div><div style={{fontSize:11,color:"#6B7280",fontWeight:700,marginTop:4}}>{med(last.med).emoji} {med(last.med).label}</div><div style={{fontSize:10,color:"#9CA3AF"}}>{f.short} {f.time}</div></>:<div style={{fontSize:13,color:"#9CA3AF",padding:"12px 0"}}>기록 없음</div>}<div style={{marginTop:8,fontSize:13,color:c.accent,fontWeight:900,background:c.badge,borderRadius:10,padding:"5px 0"}}>+ 기록하기</div></button>})}</div>}
    </>}
    {view==="input"&&kid&&<>
      <Header title={`${kid.name} ${edit?"기록 수정":"기록 입력"}`} onBack={()=>setView(edit?"history":"home")}/>
      <Section label="날짜와 시간"><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><input type="date" value={ds} onChange={e=>setDs(e.target.value)} style={inputStyle}/><input type="time" value={tm} onChange={e=>setTm(e.target.value)} style={inputStyle}/></div></Section>
      <Section label="체온"><TempPicker temp={temp} setTemp={setTemp}/><div style={{textAlign:"center",marginTop:8,fontSize:13,fontWeight:800,color:tempColor(temp)}}>{tempText(temp)}</div></Section>
      <Section label="투약"><MedPicker value={medId} setValue={setMedId}/></Section>
      {interval&&<div style={{background:interval.diff<4?"#FEF2F2":"#F9FAFB",border:`1.5px solid ${interval.diff<4?"#FCA5A5":"#E5E7EB"}`,borderRadius:14,padding:12,marginBottom:16,fontSize:13,lineHeight:1.45,color:interval.diff<4?"#B91C1C":"#4B5563",fontWeight:700}}>이 아이의 최근 {med(medId).label.replace("기침약+","")} 계열 기록: {fmt(interval.ts).short} {fmt(interval.ts).time} · 약 {Math.abs(interval.diff).toFixed(1)}시간 차이<br/>복용 간격 판단용 참고 표시이며, 정확한 복용 기준은 약 봉투·의사 안내를 확인하세요.</div>}
      <Section label="메모"><textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="예: 식후 복용, 기침 심함, 잠들기 전, 병원 다녀옴" maxLength={80} style={{...inputStyle,minHeight:82,resize:"none",fontSize:14,fontWeight:600}}/></Section>
      <button onClick={submitRecord} disabled={!medId} style={{...primary(medId?gc(kid.gender).accent:"#D1D5DB"),cursor:medId?"pointer":"default"}}>{edit?"수정 완료":"기록 저장"}</button>
    </>}
    {view==="history"&&<>
      <Header title="기록 이력" onBack={()=>setView("home")}/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:10}}>{[["today","오늘"],["24h","24시간"],["fever","미열↑"],["all","전체"]].map(([id,lb])=><button key={id} onClick={()=>setFilter(id)} style={{padding:"8px 0",border:"none",borderRadius:10,fontSize:12,fontWeight:900,background:filter===id?"#3B82F6":"#F3F4F6",color:filter===id?"#fff":"#374151"}}>{lb}</button>)}</div>
      <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:8}}><button onClick={()=>setKidFilter("all")} style={pill(kidFilter==="all","#3B82F6")}>전체</button>{kids.map(k=><button key={k.id} onClick={()=>setKidFilter(k.id)} style={pill(String(kidFilter)===String(k.id),gc(k.gender).accent)}>{gc(k.gender).emoji} {k.name}</button>)}</div>
      <div style={{display:"flex",gap:8,marginBottom:14}}><button onClick={copyToday} style={actionBtn("#F0FDF4","#16A34A")}>📋 오늘 복사</button><button onClick={exportCSV} style={actionBtn("#EFF6FF","#3B82F6")}>⬇️ CSV</button><button onClick={exportJSON} style={actionBtn("#FEF3C7","#B45309")}>💾 백업</button></div>
      {filtered.length===0?<Empty text="기록이 없습니다"/>:<div style={{display:"flex",flexDirection:"column",gap:9,maxHeight:490,overflowY:"auto"}}>{filtered.map(r=>{const k=getKid(r.kidId),c=gc(k?.gender),f=fmt(r.ts),m=med(r.med);return <div key={r.id} style={{background:"#F9FAFB",border:"1px solid #E5E7EB",borderRadius:15,padding:"11px 12px",display:"flex",gap:11,alignItems:"center"}}><div style={{minWidth:54,textAlign:"center"}}><div style={{fontSize:20}}>{c.emoji}</div><div style={{fontSize:12,fontWeight:900,color:"#1E3A5F"}}>{k?.name||"??"}</div><div style={{fontSize:21,fontWeight:900,color:tempColor(r.temp)}}>{r.temp}°</div></div><div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:900,color:"#374151"}}><span style={{color:m.color}}>{m.emoji}</span> {m.label} · {tempText(r.temp)}</div><div style={{fontSize:12,color:"#9CA3AF",fontWeight:700,marginTop:2}}>{f.dateKo} {f.time}</div>{r.note&&<div style={{fontSize:12,color:"#6B7280",marginTop:4,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>📝 {r.note}</div>}</div>{confirm===r.id?<div style={{display:"flex",flexDirection:"column",gap:4}}><button onClick={()=>removeRecord(r.id)} style={dangerSmall}>삭제</button><button onClick={()=>setConfirm(null)} style={graySmall}>취소</button></div>:<div style={{display:"flex",flexDirection:"column",gap:4}}><button onClick={()=>openEdit(r)} style={miniBtn}>✏️</button><button onClick={()=>setConfirm(r.id)} style={miniBtn}>🗑</button></div>}</div>})}</div>}
    </>}
    {view==="kids"&&<>
      <Header title="아이 관리" onBack={()=>kids.length?setView("home"):setView("kids")} right={<button onClick={()=>openKidForm(null)} style={{background:"#3B82F6",color:"#fff",border:"none",borderRadius:12,padding:"9px 13px",fontSize:14,fontWeight:900}}>+ 추가</button>}/>
      {kids.length===0?<Empty text="등록된 아이가 없어요" sub="오른쪽 위 + 추가를 눌러주세요"/>:<div style={{display:"flex",flexDirection:"column",gap:10}}>{kids.map(k=>{const c=gc(k.gender),cnt=recs.filter(r=>String(r.kidId)===String(k.id)).length;return <div key={k.id} style={{display:"flex",alignItems:"center",gap:13,background:c.bg,border:`2px solid ${c.badge}`,borderRadius:16,padding:"13px 14px"}}><div style={{fontSize:34}}>{c.emoji}</div><div style={{flex:1}}><div style={{fontSize:17,fontWeight:900,color:"#1E3A5F"}}>{k.name}</div><div style={{fontSize:12,color:c.accent,fontWeight:800}}>{c.label} · 기록 {cnt}건</div></div><button onClick={()=>openKidForm(k)} style={{background:"#fff",border:"1.5px solid #E5E7EB",borderRadius:10,padding:"8px 12px",fontSize:13,fontWeight:900}}>수정</button></div>})}</div>}
      <div style={{height:1,background:"#E5E7EB",margin:"18px 0"}}/><Section label="백업 관리"><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><button onClick={exportJSON} style={actionBtn("#FEF3C7","#B45309")}>💾 백업 저장</button><label style={{...actionBtn("#F3F4F6","#374151"),display:"flex",alignItems:"center",justifyContent:"center"}}>📂 백업 불러오기<input type="file" accept="application/json" onChange={importJSON} style={{display:"none"}}/></label></div><div style={{fontSize:12,color:"#9CA3AF",lineHeight:1.45,marginTop:8}}>GitHub Pages와 스마트폰 브라우저의 localStorage는 기기별로 따로 저장됩니다. 가끔 백업 파일을 저장해두면 안전합니다.</div></Section>
    </>}
    {view==="kidForm"&&<>
      <Header title={kidForm?"아이 정보 수정":"아이 등록"} onBack={()=>setView("kids")}/>
      <Section label="이름"><input value={kName} onChange={e=>setKName(e.target.value)} placeholder="이름을 입력하세요" maxLength={12} style={inputStyle}/></Section>
      <Section label="구분"><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>{Object.entries(GC).map(([id,c])=><button key={id} onClick={()=>setKGender(id)} style={{padding:"14px 4px",borderRadius:14,border:`2px solid ${kGender===id?c.accent:"#E5E7EB"}`,background:kGender===id?c.bg:"#F9FAFB",cursor:"pointer"}}><div style={{fontSize:30}}>{c.emoji}</div><div style={{fontSize:13,fontWeight:900,color:kGender===id?c.accent:"#374151"}}>{c.label}</div></button>)}</div></Section>
      <button onClick={saveKid} disabled={!kName.trim()} style={{...primary(kName.trim()?"#3B82F6":"#D1D5DB")}}>{kidForm?"수정 완료":"등록 완료"}</button>
      {kidForm&&<div style={{marginTop:14}}>{confirm===kidForm.id?<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><button onClick={()=>delKid(kidForm.id)} style={primary("#EF4444")}>정말 삭제</button><button onClick={()=>setConfirm(null)} style={{...primary("#E5E7EB"),color:"#374151"}}>취소</button></div>:<button onClick={()=>setConfirm(kidForm.id)} style={{width:"100%",padding:"14px",borderRadius:14,border:"2px solid #FCA5A5",background:"#FFF5F5",color:"#EF4444",fontSize:15,fontWeight:900}}>이 아이와 기록 삭제</button>}</div>}
    </>}
  </div></div>
}
function Empty({text,sub}){return <div style={{textAlign:"center",padding:"38px 0",color:"#9CA3AF"}}><div style={{fontSize:44,marginBottom:10}}>👶</div><div style={{fontSize:15,fontWeight:900,color:"#6B7280"}}>{text}</div>{sub&&<div style={{fontSize:13,marginTop:4}}>{sub}</div>}</div>}
const pill=(sel,color)=>({whiteSpace:"nowrap",padding:"8px 13px",borderRadius:999,border:"none",fontSize:13,fontWeight:900,background:sel?color:"#F3F4F6",color:sel?"#fff":"#374151",cursor:"pointer"});
const actionBtn=(bg,color)=>({flex:1,padding:"10px 5px",borderRadius:12,border:"none",fontSize:12,fontWeight:900,background:bg,color,cursor:"pointer",textAlign:"center"});
const miniBtn={background:"none",border:"none",fontSize:17,cursor:"pointer",padding:3,opacity:.75};
const dangerSmall={background:"#EF4444",color:"#fff",border:"none",borderRadius:8,padding:"5px 9px",fontSize:12,fontWeight:900};
const graySmall={background:"#E5E7EB",color:"#374151",border:"none",borderRadius:8,padding:"5px 9px",fontSize:12,fontWeight:800};
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
